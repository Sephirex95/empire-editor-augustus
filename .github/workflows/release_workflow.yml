name: Manual Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release Tag'
        required: true
      release_name:
        description: 'Release title'
        required: true
        default: 'Manual Release'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            py: "3.11"
            archive: zip
          - os: macos-13
            py: "3.11"
            archive: zip
          - os: ubuntu-latest
            py: "3.11"
            archive: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.py }}
          cache: "pip"

      - name: Install Qt runtime deps (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-cursor0 libxcb-xtest0 libxkbcommon-x11-0

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        shell: bash
        run: |
          set -euo pipefail
          if [ -f EmpireEditor.spec ]; then
            pyinstaller --noconfirm --clean EmpireEditor.spec
          else
            pyinstaller --noconfirm --clean \
              --name EmpireEditor \
              --onefile --windowed \
              --collect-all PySide6 \
              main_window.py
          fi

      # ---- Packaging (flatten dist/EmpireEditor -> archive root) ----

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          APP_NAME="EmpireEditor"
          OUT="dist"

          # include dotfiles when globbing
          shopt -s dotglob nullglob

          if [ -f "${OUT}/${APP_NAME}.exe" ]; then
            7z a "${APP_NAME}-Windows.zip" "${OUT}/${APP_NAME}.exe"
          elif [ -d "${OUT}/${APP_NAME}" ]; then
            (cd "${OUT}/${APP_NAME}" && 7z a "../../${APP_NAME}-Windows.zip" * )
          else
            echo "ERROR: ${APP_NAME} output not found in ${OUT}/"
            exit 1
          fi

      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          APP_NAME="EmpireEditor"
          OUT="dist"


          if [ -d "${OUT}/${APP_NAME}.app" ]; then
            (cd "${OUT}" && ditto -c -k --sequesterRsrc --keepParent "${APP_NAME}.app" "../${APP_NAME}-macOS.zip")
          elif [ -d "${OUT}/${APP_NAME}" ]; then
            (cd "${OUT}/${APP_NAME}" && zip -r "../../${APP_NAME}-macOS.zip" .)
          elif [ -f "${OUT}/${APP_NAME}" ]; then
            (cd "${OUT}" && zip -r "../${APP_NAME}-macOS.zip" "${APP_NAME}")
          else
            echo "ERROR: macOS output not found in ${OUT}/"
            exit 1
          fi

      - name: Package artifact (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          APP_NAME="EmpireEditor"
          OUT="dist"

          if [ -d "${OUT}/${APP_NAME}" ]; then
            (cd "${OUT}/${APP_NAME}" && tar -czf "../../${APP_NAME}-Linux.tar.gz" .)
          elif [ -f "${OUT}/${APP_NAME}" ]; then
            tar -czf "${APP_NAME}-Linux.tar.gz" -C "${OUT}" "${APP_NAME}"
          else
            echo "ERROR: Linux output not found in ${OUT}/"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-artifact
          path: |
            *.zip
            *.tar.gz

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release assets
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.event.inputs.tag }}
          commit: ${{ github.sha }}
          name: ${{ github.event.inputs.release_name }}
          body: "Automated manual release from ${{ github.sha }}. Edit notes after run."
          artifacts: "artifacts/*"
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
