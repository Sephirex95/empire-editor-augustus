name: Continuous Build

on:
  push:
    branches: ["**"]
    tags-ignore: ["continuous"]   # don't retrigger when we move the tag
  workflow_dispatch:

permissions:
  contents: write   # needed to create/update the release and tag

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            py: "3.11"
            archive: zip
          - os: macos-13
            py: "3.11"
            archive: zip
          - os: ubuntu-latest
            py: "3.11"
            archive: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.py }}
          cache: "pip"

      - name: Install Qt runtime deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-cursor0 libxcb-xtest0 libxkbcommon-x11-0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Show versions
        run: >
          python -c "import sys, PyInstaller, PIL, PySide6;
          print(sys.version);
          print('PyInstaller', PyInstaller.__version__);
          print('Pillow', PIL.__version__);
          print('PySide6', PySide6.__version__)"

      - name: Build with PyInstaller
        run: |
          if [ -f app.spec ]; then
            pyinstaller --noconfirm --clean app.spec
          else
            pyinstaller --noconfirm --clean \
              --name EmpireEditor \
              --onefile --windowed \
              --collect-all PySide6 \
              src/main.py
          fi

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          set -e
          APP_NAME="EmpireEditor"
          echo "==== dist tree ===="
          ls -la dist || true
          if [ -f "dist/${APP_NAME}.exe" ]; then
            7z a "${APP_NAME}-Windows.zip" "dist/${APP_NAME}.exe"
          elif [ -d "dist/${APP_NAME}" ]; then
            7z a "${APP_NAME}-Windows.zip" "dist/${APP_NAME}"
          else
            echo "ERROR: ${APP_NAME} output not found in dist/"
            ls -R dist || true
            exit 1
          fi

      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          APP_NAME="EmpireEditor"
          OUT="dist"
          if [ -d "${OUT}/${APP_NAME}.app" ]; then
            ditto -c -k --sequesterRsrc --keepParent "${OUT}/${APP_NAME}.app" "${APP_NAME}-macOS.zip"
          else
            cd "${OUT}"
            zip -r "../${APP_NAME}-macOS.zip" "${APP_NAME}"
            cd -
          fi

      - name: Package artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          APP_NAME="EmpireEditor"
          tar -czf "${APP_NAME}-Linux.tar.gz" -C dist "${APP_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-artifact
          path: |
            *.zip
            *.tar.gz

  release:
    name: Update "continuous" Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      # Create/update a single rolling release tied to tag "continuous"
      - name: Publish (overwrite) release assets
        uses: ncipollo/release-action@v1
        with:
          tag: continuous                      # fixed rolling tag
          commit: ${{ github.sha }}            # move tag to this commit
          name: "Continuous build"
          body: "Automated build from ${{ github.ref }} @ ${{ github.sha }}"
          artifacts: "artifacts/*"
          allowUpdates: true                   # update existing release
          replacesArtifacts: true              # delete & re-upload assets
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
