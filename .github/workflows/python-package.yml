name: Build and Release

on:
  push:
    tags:
      - "v*"          # e.g. v0.1.0
  workflow_dispatch:   # allow manual runs

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            py: "3.11"
            archive: zip
          - os: macos-13
            py: "3.11"
            archive: zip
          - os: ubuntu-latest
            py: "3.11"
            archive: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.py }}
          cache: "pip"

      - name: Install Qt runtime deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-cursor0 libxcb-xtest0 libxkbcommon-x11-0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Show versions
        shell: bash
        run: |
          python - <<'PY'
          import sys
          import PyInstaller, PIL, PySide6
          print(sys.version)
          print("PyInstaller", PyInstaller.__version__)
          print("Pillow", PIL.__version__)
          print("PySide6", PySide6.__version__)
          PY


      - name: Build with PyInstaller
        shell: bash
        run: |
          if [ -f EmpireEditor.spec ]; then
            pyinstaller --noconfirm --clean EmpireEditor.spec
          else
            pyinstaller --noconfirm --clean \
              --name EmpireEditor \
              --onefile --windowed \
              --collect-all PySide6 \
              src/main.py
          fi

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -e
          APP_NAME="EmpireEditor"
      
          # Show dist layout (useful while we stabilize)
          echo "==== dist tree ===="
          ls -la dist || true
          if command -v tree >/dev/null 2>&1; then tree dist; fi
          echo "==================="
      
          if [ -f "dist/${APP_NAME}.exe" ]; then
            echo "Found onefile exe: dist/${APP_NAME}.exe"
            7z a "${APP_NAME}-Windows.zip" "dist/${APP_NAME}.exe"
          elif [ -d "dist/${APP_NAME}" ] && [ -f "dist/${APP_NAME}/${APP_NAME}.exe" ]; then
            echo "Found onedir app: dist/${APP_NAME}/"
            7z a "${APP_NAME}-Windows.zip" "dist/${APP_NAME}"
          else
            echo "ERROR: Could not find ${APP_NAME} output under dist/"
            ls -R dist || true
            exit 1
          fi


      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-artifact
          path: |
            *.zip
            *.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate release notes (optional)
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "notes=Automated build for ${TAG}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          name: Release ${{ steps.notes.outputs.tag }}
          body: ${{ steps.notes.outputs.notes }}
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
